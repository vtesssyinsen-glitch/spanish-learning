ulpe, ¿dónde está el mostrador de facturación?",pronunciation:"dis-KUL-peh DON-deh es-TAH el mos-tra-DOR deh fak-tu-ra-SYON",chinese:"打扰一下，值机柜台在哪里？"},{speaker:"B",speakerName:"工作人员",spanish:"Está en la Terminal 2, a la derecha.",pronunciation:"es-TAH en la ter-mi-NAL dos a la deh-REH-cha",chinese:"在2号航站楼，右边。"},{speaker:"A",speakerName:"你",spanish:"Quisiera facturar esta maleta.",pronunciation:"ki-SYEH-ra fak-tu-RAR ES-ta ma-LEH-ta",chinese:"我想托运这个行李箱。"},{speaker:"B",speakerName:"工作人员",spanish:"¿Tiene su pasaporte y el billete?",pronunciation:"TYEH-neh soo pa-sa-POR-teh ee el bi-YEH-teh",chinese:"您有护照和机票吗？"},{speaker:"A",speakerName:"你",spanish:"Sí, aquí los tiene.",pronunciation:"see ah-KEE los TYEH-neh",chinese:"有的，给您。"},{speaker:"B",speakerName:"工作人员",spanish:"Su vuelo sale a las tres. La puerta es la B12.",pronunciation:"soo BWEH-lo SA-leh a las trehs la PWER-ta es la beh DO-seh",chinese:"您的航班3点出发，登机口是B12。"},{speaker:"A",speakerName:"你",spanish:"¿Hay que pasar por seguridad?",pronunciation:"eye keh pa-SAR por seh-goo-ri-DAD",chinese:"需要过安检吗？"},{speaker:"B",speakerName:"工作人员",spanish:"Sí, está al fondo a la izquierda. ¡Buen viaje!",pronunciation:"see es-TAH al FON-do a la is-KYEHR-da bwen BYA-heh",chinese:"是的，在尽头左边。旅途愉快！"}],vocabulary:[{spanish:"el aeropuerto",pronunciation:"el ae-ro-PWER-to",chinese:"机场"},{spanish:"facturación",pronunciation:"fak-tu-ra-SYON",chinese:"值机/托运"},{spanish:"el pasaporte",pronunciation:"el pa-sa-POR-teh",chinese:"护照"},{spanish:"el billete",pronunciation:"el bi-YEH-teh",chinese:"机票/车票"},{spanish:"la puerta",pronunciation:"la PWER-ta",chinese:"登机口/门"},{spanish:"¡buen viaje!",pronunciation:"bwen BYA-heh",chinese:"旅途愉快！"}]},{id:3,icon:"🍽️",title:"在餐厅",subtitle:"En el restaurante",dialogue:[{speaker:"B",speakerName:"服务员",spanish:"Buenas noches, ¿tiene reserva?",pronunciation:"BWEH-nas NO-chehs TYEH-neh reh-SER-ba",chinese:"晚上好，您有预约吗？"},{speaker:"A",speakerName:"你",spanish:"No, somos dos personas.",pronunciation:"no SO-mos dos per-SO-nas",chi o se sirve de siete a diez.",pronunciation:"see el deh-sa-YOO-no seh SEER-beh deh SYEH-teh a DYEH-s",chinese:"是的，早餐从7点供应到10点。"},{speaker:"A",speakerName:"你",spanish:"¿Hay WiFi gratuito en la habitación?",pronunciation:"eye wee-FEE gra-TWEE-to en la a-bi-ta-SYON",chinese:"房间里有免费WiFi吗？"},{speaker:"B",speakerName:"前台",spanish:"Sí, la contraseña está en esta tarjeta.",pronunciation:"see la kon-tra-SEH-nya es-TAH en ES-ta tar-HEH-ta",chinese:"有的，密码在这张卡上。"},{speaker:"A",speakerName:"你",spanish:"Muchas gracias. ¿Cuál es mi número de habitación?",pronunciation:"MOO-chas GRA-syas kwal es mee NOO-meh-ro deh a-bi-ta-SYON",chinese:"非常感谢。我的房间号是多少？"},{speaker:"B",speakerName:"前台",spanish:"Es la 305, en el tercer piso. ¡Que descanse!",pronunciation:"es la trehs-SYEH-n-SEEN-ko en el ter-SER PEE-so keh des-KAN-seh",chinese:"是305，在三楼。祝您休息好！"}],vocabulary:[{spanish:"la reserva",pronunciation:"la reh-SER-ba",chinese:"预约/预订"},{spanish:"la habitación",pronunciation:"la a-bi-ta-SYON",chinese:"房间"},{spanish:"el desayuno",pronunciation:"el deh-sa-YOO-no",chinese:"早餐"},{spanish:"incluido",pronunciation:"in-kloo-EE-do",chinese:"包含在内"},{spanish:"la contraseña",pronunciation:"la kon-tra-SEH-nya",chinese:"密码"},{spanish:"el piso",pronunciation:"el PEE-so",chinese:"楼层"}]},{id:5,icon:"🛍️",title:"逛商店",subtitle:"De compras",dialogue:[{speaker:"B",speakerName:"店员",spanish:"¡Buenos días! ¿En qué le puedo ayudar?",pronunciation:"BWEH-nos DEE-as en keh leh PWEH-do a-yoo-DAR",chinese:"早上好！我能帮您什么？"},{speaker:"A",speakerName:"你",spanish:"Estoy buscando una camiseta de talla mediana.",pronunciation:"es-TOY boos-KAN-do OO-na ka-mi-SEH-ta deh TA-ya meh-DYAH-na",chinese:"我在找一件中号的T恤。"},{speaker:"B",speakerName:"店员",spanish:"Tenemos estas en varios colores. ¿Le gusta alguno?",pronunciation:"teh-NEH-mos ES-tas en BAH-ryos ko-LO-rehs leh GOOS-ta al-GOO-no",chinese:"我们有各种颜色的。您喜欢哪种？"},{speaker:"A",speakerName:"你",spanish:"Me gusta la azul. ¿Puedo probármela?",pronunciation:"meh GOOS-ta la a-SOOL PWEH-do pro-BAR-meh-la",chinese:"我喜欢蓝色的。我可以试穿吗？"},{speaker:"B",speakerName:"店员",spanish:"Claro, el probador está al fondo.",pronunciation:"KLA-ro el pro-ba-DOR es-TAH al FON-do",chinese:"当然，试衣间在里面。"},{speaker:"A",speakerName:"你",spanish:"Me queda bien. ¿Cuánto cuesta?",pronunciation:"meh KEH-da byen KWAN-to KWES-ta",chinese:"很合身。多少钱？"},{speaker:"B",speakerName:"店员",spanish:"Veinte euros. ¿Paga en efectivo o con tarjeta?",pronunciation:"BAYN-teh EH-oo-ros PA-ga en eh-fek-TEE-bo o kon tar-HEH-ta",chinese:"20欧元。您付现金还是刷卡？"},{speaker:"A",speakerName:"你",spanish:"Con tarjeta, por favor.",pronunciation:"kon tar-HEH-ta por fah-BOR",chinese:"刷卡，麻烦了。"}],vocabulary:[{spanish:"la camiseta",pronunciation:"la ka-mi-SEH-ta",chinese:"T恤"},{spanish:"la talla",pronunciation:"la TA-ya",chinese:"尺码"},{spanish:"el probador",pronunciation:"el pro-ba-DOR",chinese:"试衣间"},{spanish:"me queda bien",pronunciation:"meh KEH-da byen",chinese:"很合身"},{spanish:"en efectivo",pronunciation:"en eh-fek-TEE-bo",chinese:"用现金"},{spanish:"la tarjeta",pronunciation:"la tar-HEH-ta",chinese:"银行卡"}]},{id:6,icon:"💊",title:"在药店",subtitle:"En la farmacia",dialogue:[{speaker:"A",speakerName:"你",spanish:"Buenos días, necesito algo para el dolor de cabeza.",pronunciation:"BWEH-nos DEE-as neh-seh-SEE-to AL-go PA-ra el do-LOR deh ka-BEH-sa",chinese:"早上好，我需要一些治头痛的药。"},{speaker:"B",speakerName:"药剂师",spanish:"¿Tiene fiebre también?",pronunciation:"TYEH-neh FYEH-breh tam-BYEN",chinese:"您也发烧吗？"},{speaker:"A",speakerName:"你",spanish:"No, solo me duele la cabeza desde esta mañana.",pronunciation:"no SO-lo meh DWEH-leh la ka-BEH-sa DES-deh ES-ta ma-NYA-na",chinese:"不，今早起来只是头疼。"},{speaker:"B",speakerName:"药剂师",spanish:"Le recomiendo este ibuprofeno. Tome uno cada seis horas.",pronunciation:"leh reh-ko-MYEN-do ES-teh ee-boo-pro-FEH-no TO-meh OO-no KA-da says O-ras",chinese:"我给您推荐这款布洛芬。每6小时服用一片。"},{speaker:"A",speakerName:"你",spanish:"¿Tiene efectos secundarios?",pronunciation:"TYEH-neh eh-FEK-tos seh-koon-DAH-ryos",chinese:"有副作用吗？"},{speaker:"B",speakerName:"药剂师",spanish:"Puede causar molestias estomacales. Tómelo con comida.",pronunciation:"PWEH-deh ka-oo-SAR mo-LES-tyas es-to-ma-KA-lehs TO-meh-lo kon ko-MEE-da",chinese:"可能引起胃部不适。请随餐服用。"},{speaker:"A",speakerName:"你",spanish:"Entendido. ¿Cuánto es?",pronunciation:"en-ten-DEE-do KWAN-to es",chinese:"明白了。多少钱？"},{speaker:"B",speakerName:"药剂师",spanish:"Son cuatro euros con cincuenta.",pronunciation:"son KWA-tro EH-oo-ros kon seen-KWEN-ta",chinese:"4欧元50分。"}],vocabulary:[{spanish:"la farmacia",pronunciation:"la far-MA-sya",chinese:"药店"},{spanish:"el dolor de cabeza",pronunciation:"el do-LOR deh ka-BEH-sa",chinese:"头痛"},{spanish:"la fiebre",pronunciation:"la FYEH-breh",chinese:"发烧"},{spanish:"tomar / tome",pronunciation:"to-MAR / TO-meh",chinese:"服用"},{spanish:"los efectos secundarios",pronunciation:"los eh-FEK-tos seh-koon-DAH-ryos",chinese:"副作用"},{spanish:"con comida",pronunciation:"kon ko-MEE-da",chinese:"随餐服用"}]},{id:7,icon:"🏥",title:"看医生",subtitle:"En el médico",dialogue:[{speaker:"B",speakerName:"医生",spanish:"¿Qué le pasa? ¿Cómo se encuentra?",pronunciation:"keh leh PA-sa KO-mo seh en-KWEN-tra",chinese:"您哪里不舒服？感觉怎么样？"},{speaker:"A",speakerName:"你",spanish:"Me duele el estómago desde ayer.",pronunciation:"meh DWEH-leh el es-TO-ma-go DES-deh a-YER",chinese:"我从昨天起胃就不舒服。"},{speaker:"B",speakerName:"医生",spanish:"¿Tiene náuseas o vómitos?",pronunciation:"TYEH-neh NAW-seh-as o BO-mi-tos",chinese:"有恶心或呕吐吗？"},{speaker:"A",speakerName:"你",spanish:"Sí, también tengo náuseas.",pronunciation:"see tam-BYEN TEN-go NAW-seh-as",chinese:"是的，也有恶心。"},{speaker:"B",speakerName:"医生",spanish:"Voy a examinarle. ¿Le duele aquí?",pronunciation:"boy a eg-sa-mi-NAR-leh leh DWEH-leh ah-KEE",chinese:"我来给您检查一下。这里痛吗？"},{speaker:"A",speakerName:"你",spanish:"Sí, bastante. Ay.",pronunciation:"see bas-TAN-teh eye",chinese:"是的，很疼。哎哟。"},{speaker:"B",speakerName:"医生",spanish:"Parece una gastritis. Le voy a recetar un medicamento.",pronunciation:"pa-REH-seh OO-na gas-TREE-tis leh boy a reh-seh-TAR o   _rb.textContent="▶ 朗读全文";
  var _playing=false;var _stopFlag=false;
  _rb.onclick=function(){
    if(_playing){_stopFlag=true;_playing=false;_rb.textContent="▶ 朗读全文";window._curAudio.pause();return;}
    var paras=Array.from(document.querySelectorAll("p.font-semibold.text-sm.leading-relaxed"));
    var texts=paras.map(function(p){return p.textContent.trim();}).filter(function(t){return t.length>0;});
    if(!texts.length)return;
    _playing=true;_stopFlag=false;_rb.textContent="⏹ 停止朗读";
    var i=0;
    function next(){
      if(_stopFlag||i>=texts.length){_playing=false;_stopFlag=false;_rb.textContent="▶ 朗读全文";return;}
      window._d(texts[i]);i++;setTimeout(next,2800);
    }
    next();
  };
  document.body.appendChild(_rb);

  // Show/hide both buttons based on current view
  var _obs=new MutationObserver(function(){
    var inDialogue=Array.from(document.querySelectorAll("p")).some(function(p){return p.textContent.includes("点击听发音");});
    _sb.style.display=inDialogue?"block":"none";
    _rb.style.display=inDialogue?"block":"none";
  });
  _obs.observe(document.body,{childList:true,subtree:true});
})();
</script>
